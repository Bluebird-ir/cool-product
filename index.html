<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Cool Product!</title>
    <!-- Fonts -->
    <!-- preconnect - tells the browser to establish a connection to the specified origin before making requests -->
    <!-- https://fonts.googleapis.com - gives us css for google fonts -->
    <!-- https://fonts.gstatic.com - provides the font files -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <!-- end Fonts -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header"></header>
    <!-- end Header -->
    <main></main>
    <footer></footer>
  </body>
</html>
